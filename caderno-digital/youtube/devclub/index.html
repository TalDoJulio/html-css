<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centralizar DIV</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        div {
            display: flex;
            height: 250px;
            width: 250px;
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <div></div>
    <p>Temos um cara chamado <strong>display: flex</strong>, com o display: flex conseguimos alinhar tanto no eixo horizontal e vertical.</p>
    <p>Display: flex é para ser usado em div, ele habilita alguns recursos como:</p>
    <p>align-items</p>
</body>
</html>
