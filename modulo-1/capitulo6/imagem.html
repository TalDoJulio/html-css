<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com Imagens</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        body {
            width: 100%;
            height: 100vh;
        }
        header {
            text-align: center;
            padding: 10px 0px;
            background-color: oklch(14.7% 0.004 49.25);
            color: oklch(92.3% 0.003 48.717);
            
        }
        header > h1 {
            
            font-family: "Roboto", sans-serif;
            font-weight: 1000;
            font-style: normal;
            font-size: 4vw;
        }
        main {
            margin: 0px auto;
            padding-top: 6px;
            min-width: 800px;
            max-width: 1000px;
            background-color: oklch(86.9% 0.005 56.366);
            text-align: center;

        }
        section {
            margin: 6px auto;
            padding: 5px;
            border: 1px solid black;
            width: 500px;
            border-radius: 10px;
        }
        section.html {
            background-color: oklch(90.1% 0.076 70.697);
        }
        section.css {
        background-color: oklch(88.2% 0.059 254.128);
        }
        section.js {
            background-color: oklch(94.5% 0.129 101.54);
        }
    </style>
</head>
<body>
    <header>
        <h1>Testando carga de imagem</h1>
    </header>
    <main>
        <!-- Logo HTML5 -->
        <section class="html">
            <h2>Abaixo voce vai ver uma imagem que esta na mesma pasta</h2>
            <img src="logohtml5-250.png" alt="Logo HTML5">
        </section>

        <!-- Logo CSS3 -->
        <section class="css">
            <h2>Podemos tambem carregar imagens que estao em sub-pastas</h2>
            <img src="imagens/logocss3-350.png" alt="Logo CSS3">
        </section>

        <!-- Logo JavaScript -->
         <section class="js">
            <h2>Tambem podemos carregar imagens externas</h2>
            <img src="https://th.bing.com/th/id/R.e797a8c593c81d72f395d1ccc022ba3f?rik=hkRb06Mmz2ukYQ&riu=http%3a%2f%2fluizricardo.org%2fwordpress%2fwp-content%2fupload-files%2f2014%2f03%2fjavascript_logo_unofficial-300x300.png&ehk=%2fqYxmUz6V6zUuaq%2fy9VGL1n7Z%2fYQsg5LokUTIK%2btqLg%3d&risl=&pid=ImgRaw&r=0" alt="Logo JavaScript">
         </section>
    </main>
</body>
</html>
