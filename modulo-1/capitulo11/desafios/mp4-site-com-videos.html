<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Um site com videos</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        body {
            background-color: black;
            width: 100%;
            height: 100%;
        }
        header {
            width: 100%;
            text-align: center;
            padding: 25px;
        }
        h1 {
            color: white;
        }




        
        section {
            background-color: black;
            width: 100%;
            padding-top: 25px;

            display: flex;
            flex-flow: column nowrap;
        }
        section > div {
            margin: 2px auto;
            width: 560px;
            border: 1px solid red;
            box-shadow: 2px 2px 3px rgba(255, 255, 255, 0.459);
        }
        section > div.texto {
            text-align: center;
        }
        section > div.texto > h2 > a {
            color: white;
            text-decoration: none;
        }
        section > div.texto > h2 > a:hover {
            text-transform: uppercase;
            padding: 5px;
        }
        section > div.voltar {
            background-color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <header>
        <h1><strong>DESAFIO:</strong> Um site com videos - @Curso em Video HTML5 e CSS3</h1>
    </header>
    <section>
        <div class="MP4">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/gqrySQQzvvQ?si=IVOl2PdCnGav_eGx" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
        <div class="texto">
            <h2><a href="https://www.youtube.com/watch?v=1-w1RfGIov4&list=PLHz_AreHm4dlsK3Nr9GVvXCbpQyHQl1o1" target="_blank">Veja esse curso completo de JavaScript</a></h2>
        </div>
        <div class="voltar">
            <a href="1site_com_videos.html.html"><img src="img/icons8-seta-esquerda-50.png" alt="seta para voltar a pagina anterior"></a>
        </div>
    </section>
    <footer>
        
    </footer>

</html>
