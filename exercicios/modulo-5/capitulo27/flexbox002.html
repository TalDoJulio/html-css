<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direções e Eixos</title>
    <style>
        body {
            background-color: black;
        }
        div#iflex {

            background-color: white;



            display: flex;
        }
        div.item {
            background-color: chocolate;
            text-align: center;
            border: 1px solid white;



            flex: auto;
        }
    </style>
</head>
<body>
    <h1>CSS Flexible Box Module</h1>
    <p>Na aula anterios nos falamos sobre o container(pai), o <q>pai</q> é quem leva a configuração <q>display: flex;</q></p>
    <div id="container">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
    </div>


</body>
</html>
