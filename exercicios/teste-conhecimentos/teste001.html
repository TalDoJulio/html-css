<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de conhecimentos</title>
</head>
<body>
    <header>
        <h1>Teste seus conhecimentos</h1>
        <p>Responda a essas 10 perguntas objetivas e marque em cada uma delas a unica opção verdadeira.</p>
    </header>
    <main>
        <!--Introdução-->
        <section>
            <h1>História da Internet</h1>
            <p>Perguntas tiradas do <a href="https://github.com/gustavoguanabara/html-css/blob/master/aulas-pdf/01%20-%20Hist%C3%B3ria%20da%20Internet.pdf" target="_blank">github de gustavo guanabara</a></p>
        </section>
        <!--Pergunta 1-->
        <section>
            <h2>Pergunta 1: Em qual periodo Historico da humanidade a Internet surgiu?</h2>
            <form>
                <input type="radio" name="pergunta-1" id="P1A">
                <label for="P1A">Durante 2ª Guerra Mundial</label>
                <input type="radio" name="pergunta-1" id="P1B">
                <label for="P1B">Durante a Guerra dos 100 anos</label>
            </form>

        </section>
    </main>
</body>
</html>
